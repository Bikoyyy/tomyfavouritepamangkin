<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a1228">
  <meta name="format-detection" content="telephone=no">
  <title>For the little one...</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&family=Caveat:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background gradient layer -->
  <div class="bg-gradient"></div>

  <!-- Loading indicator -->
  <div class="loading-indicator" id="loadingIndicator">loading...</div>

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Moon -->
  <div class="moon-container">
    <div class="moon"></div>
  </div>

  <!-- Clouds -->
  <div class="cloud"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <!-- Audio Element for Lullaby -->
  <audio id="lullabyAudio" loop preload="metadata" playsinline>
    <source src="lullaby.mp3" type="audio/mpeg">
  </audio>

  <!-- Sound Toggle Button -->
  <div class="sound-toggle" id="soundToggle" role="button" aria-label="Toggle lullaby music">
    <span class="sound-icon" id="soundIcon">🎵</span>
    <span class="sound-text" id="soundText">play lullaby</span>
  </div>

  <!-- Main Story Wrapper -->
  <div class="story-wrapper">
    
    <!-- Welcome Screen -->
    <div id="welcomeScreen" class="welcome-card">
      <div class="welcome-icon">🧸✨</div>
      <div class="welcome-title">for the little one</div>
      <div class="welcome-sub">a message from the heart</div>
      <button class="start-btn" id="startBtn">open the book 🌙</button>
    </div>

    <!-- Book Container -->
    <div id="bookContainer" class="book-container hidden">
      <div class="book-shadow"></div>
      <div class="book" id="book" role="button" aria-label="Story book, swipe or tap to turn pages">
        
        <!-- Left Page -->
        <div class="page-left" id="pageLeft">
          <div class="ruled-lines"></div>
          <div class="margin-line"></div>
          <div class="page-content">
            <div class="progress-dots" id="progressDots"></div>
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
              <div class="book-title">A Little Book</div>
              <div class="book-subtitle">
                of love & dreams<br>
                for the one we can't wait to meet
              </div>
              <div class="left-decoration">
                <span>🌸</span><span>✨</span><span>🌸</span>
              </div>
            </div>
            <div class="page-number-left" id="pageNumberLeft">— 1 —</div>
          </div>
        </div>
        
        <!-- Right Page (flippable) -->
        <div class="page-right" id="pageRight">
          <div class="ruled-lines"></div>
          <div class="margin-line"></div>
          <div class="page-content">
            <div id="story-text"></div>
            <div class="continue-hint" id="hintMessage">
              <span>✧</span> swipe or tap to continue <span>✧</span>
            </div>
            <button class="next-btn" id="nextButton">turn the page ↪</button>
          </div>
          <div class="page-number-right" id="pageNumberRight">— 2 —</div>
          <div class="page-curl"></div>
        </div>
        
        <!-- Book spine -->
        <div class="book-spine"></div>
        
        <!-- Swipe hint -->
        <div class="swipe-hint" id="swipeHint">
          <span class="swipe-arrow">👆</span>
          <span class="swipe-text">swipe from edge</span>
        </div>
        
        <!-- Swipe instruction overlay -->
        <div class="swipe-instruction" id="swipeInstruction">← swipe left to turn →</div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
